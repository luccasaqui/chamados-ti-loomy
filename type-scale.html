<!-- @dsCard group="Tipografia" viewport="720x320" name="Escala Montserrat" subtitle="Pesos 600/700, tamanhos contidos — leitura, não banner" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="theme.css" />
<style>
  body { padding: 28px; }
  .t { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .t:last-child { border-bottom: none; }
  .t .sample { color: var(--text); }
  .t .spec { white-space: nowrap; }
  .s-title { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .s-quest { font-size: 22px; font-weight: 600; }
  .s-section { font-size: 20px; font-weight: 700; }
  .s-body { font-size: 16px; font-weight: 500; }
  .s-sec { font-size: 14px; font-weight: 500; color: var(--muted); }
  .s-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2); }
</style>
</head>
<body>
  <div class="t"><span class="sample s-title">Portal de Chamados de T.I.</span><span class="spec">28 · Bold</span></div>
  <div class="t"><span class="sample s-quest">Como podemos ajudar?</span><span class="spec">22 · SemiBold</span></div>
  <div class="t"><span class="sample s-section">Meus chamados</span><span class="spec">20 · Bold</span></div>
  <div class="t"><span class="sample s-body">Descreva o problema com o máximo de detalhes.</span><span class="spec">16 · Medium</span></div>
  <div class="t"><span class="sample s-sec">O retorno é feito via Teams ou WhatsApp.</span><span class="spec">14 · Medium</span></div>
  <div class="t"><span class="sample s-label">Identificação</span><span class="spec">12 · Bold · caps</span></div>
</body>
</html>
