<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="theme.css" />
<style>
  body { min-height: 100vh; }
  .screen { min-height: 100vh; display: flex; flex-direction: column; padding: 18px 24px 26px; }
  .hdr { display: flex; align-items: center; justify-content: space-between; }
  .hdr-btn { padding: 8px 14px; font-size: 13px; border-radius: 999px; border: 1px solid var(--border); }
  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px; padding: 0 24px; }
  .stage h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.02em; margin: 0; line-height: 1.1; }
  .stage p { font-size: 16px; font-weight: 500; color: var(--muted); margin: 0; max-width: 30rem; line-height: 1.55; }
  .tagline { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); }
</style>
</head>
<body>
  <div class="screen">
    <header class="hdr">
      <span class="wordmark">L<b>oo</b>my</span>
      <button class="btn btn-ghost hdr-btn" type="button">Meus chamados</button>
    </header>
    <main class="stage">
      <span class="tagline">Suporte · Apontamentos · Melhorias</span>
      <h1>Portal de Chamados de T.I.</h1>
      <p>Abra um chamado de Suporte, Acessos &amp; Contas, Equipamentos, Automação de Processos ou IA Aplicada.</p>
      <button class="btn btn-primary" type="button" style="margin-top:6px">Começar
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </main>
  </div>
</body>
</html>
